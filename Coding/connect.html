<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="connect.CSS">
    <title>BiblioNest</title>
</head>
<body>
    
    <header>
        <div>
            <div class="header-text">BiblioNest</div>
        </div>
    </header>

    <main>
        <div class="login-container">
            <form action="login.php" method="POST" class="login-form">
                <input type="email" id="email" name="email" placeholder="email" maxlength="40" required>
                <input type="password" id="password" name="password" placeholder="Mot de passe" maxlength="20" required>
                <span class="help">Vous n'avez pas encore de compte ou mot de passe oublié ?</span>
                <button class="connexion" type="submit">Connexion</button>
                <span class="error">email ou mot de passe invalide !</span>
            </form>
        </div>
    </main>

    <footer>
        <div>
            <div class="footer-text">© 2024 BiblioNest Tous droits réservés</div>
        </div>
    </footer>

    <script src="connect.JS"></script>
</body>
</html>
